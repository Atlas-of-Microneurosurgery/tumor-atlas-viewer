<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tumor Atlas Viewer</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

  <model-viewer
    src="models/base_anatomy.glb"
    camera-controls
    auto-rotate
    shadow-intensity="0"
    exposure="1">
  </model-viewer>

</body>
</html>
